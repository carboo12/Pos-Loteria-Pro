# Firebase App Hosting configuration
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 2

env:
  # NODE_ENV=production ONLY at RUNTIME so that npm ci installs devDependencies
  # (vite, esbuild) during the build step. At runtime the server uses static files.
  - variable: NODE_ENV
    value: production
    availability:
      - RUNTIME

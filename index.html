<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Punto de Venta - Lotería</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e293b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="description" content="Sistema de Punto de Venta para Loterías de Nicaragua y Honduras" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <script>
      (function() {
        var KEY = "sw_rl_v9";
        if (sessionStorage.getItem(KEY)) { sessionStorage.removeItem(KEY); return; }
        window.addEventListener("error", function(e) {
          var t = e.target;
          if (!t) return;
          var tag = t.tagName;
          if (tag === "SCRIPT" || tag === "LINK") {
            var url = t.src || t.href || "";
            if (/\.(js|css)(\?|$)/.test(url)) {
              sessionStorage.setItem(KEY, "1");
              location.reload();
            }
          }
        }, true);
        window.addEventListener("unhandledrejection", function(e) {
          var msg = (e.reason && e.reason.message) || "";
          if (/ChunkLoad|Loading chunk|Loading CSS chunk|Importing a module script/.test(msg)) {
            sessionStorage.setItem(KEY, "1");
            location.reload();
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
